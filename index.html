<main class="cifra-tuner">
    <div class="header-cifra">
        <img src="https://www.cifraclub.com.br/favicon.ico" width="20" alt="logo">
        <span>Afinador Cifra Club Style</span>
    </div>

    <div class="tuner-display">
        <div class="arc-container">
            <div class="arc-bg"></div>
            <div class="pointer-cifra" id="pointer"></div>
            <div class="center-marker"></div>
        </div>
        
        <div class="note-info">
            <h2 id="note-name">E</h2>
            <p id="frequency">0.0 Hz</p>
        </div>
    </div>

    <div class="string-selector">
        <div class="string" data-note="e">e<span>1</span></div>
        <div class="string" data-note="B">B<span>2</span></div>
        <div class="string" data-note="G">G<span>3</span></div>
        <div class="string" data-note="D">D<span>4</span></div>
        <div class="string" data-note="A">A<span>5</span></div>
        <div class="string active" data-note="E">E<span>6</span></div>
    </div>

    <button id="start-btn">LIGAR</button>
</main>
