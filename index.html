<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Afinador Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tuner-container">
        <h1>Afinador</h1>
        <div class="gauge">
            <div class="meter"></div>
            <div class="pointer" id="pointer"></div>
            <div class="center-line"></div>
        </div>
        <div class="notes">
            <span id="note-name">-</span>
        </div>
        <div class="frequency"><span id="frequency">0</span> Hz</div>
        <button id="start-btn">Ligar Afinador</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
